name=PicoCallback
version=0.1.0
author=Michał Leśniewski
maintainer=Michał Leśniewski <mlesniew@gmail.com>
sentence=Lightweight, heap-free callback wrapper — a compact alternative to std::function.
paragraph=PicoCallback provides a type-safe callback mechanism that avoids heap allocations. Each callback instance stores a function pointer and a context pointer, occupying only 8 bytes. It supports free functions, non-capturing lambdas, and member-function-style callbacks via a context pointer. An optional compatibility mode backed by std::function is available via the PICOCALLBACK_USE_STD_FUNCTION define.
category=Other
